<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>word-project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="background"></div>
        <div class="header">
            <div class="first-head">
                <h1 class="first-head--normal">Word <span class="first-head--special">Analytics</span></h1>
            </div>
            <div class="second-head">
                <h2>Word Analytics Tool</h2>
            </div>
        </div>
        <div class="body-container"></div>
        <div class="box">
            <textarea class="textarea" placeholder="Enter Your Text"></textarea>
            <div class="items">
                <section class="box-items">
                <span class="box-number state__number--words">0</span>
                <h2 class="heading">Words</h2>
            </section>
            <section class="box-items">
                <span class="box-number state__number--characters">0</span>
                <h2 class="heading">Characters</h2>
            </section>
            <section class="box-items">
                <span class="box-number state__number--twitter">280</span>
                <h2 class="heading">Twitter</h2>
            </section>
            <section class="box-items">
                <span class="box-number state__number--facebook">2200</span>
                <h2 class="heading">Facebook</h2>
            </section>
            </div>
        </div>
        <footer class="footer">
            <small class="copyright">
                &copy; Copyright by javaScript.ir All rights reserved
            </small>
            <small class="data">
                Last checked limits: 17 days ago
            </small>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
